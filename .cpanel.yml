---
deployment:
  tasks:
    # 1. Export paths to Node.js (cPanel requires this to use npm commands)
    - export PATH=/opt/cpanel/ea-nodejs18/bin/:$PATH
    
    # 2. Build the React Frontend
    - npm install
    - npm run build
    
    # 3. Move the compiled frontend website to the public_html folder
    - /bin/cp -R dist/* $HOME/public_html/
    
    # 4. Handle Backend
    - /bin/mkdir -p $HOME/backend
    - /bin/cp -R backend/* $HOME/backend/
    - cd $HOME/backend && npm install --production
